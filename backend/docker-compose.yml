services:
  db:
    image: postgres:15-alpine
    container_name: inventory-db
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: inventory_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  backend:
    build: .
    container_name: inventory-backend
    volumes:
      - .:/app
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_NAME=inventory_db
      - DB_USER=devuser
      - DB_PASSWORD=dev_password
      - DB_PORT=5432
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: "always"
    deploy:
      resources:
        limits:
          memory: 512M
    command: bash entrypoint.sh

volumes:
  postgres_data:
