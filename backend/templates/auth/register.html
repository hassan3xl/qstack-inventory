{% extends 'base.html' %}

{% block title %}Register - Platform Admin{% endblock %}

{% block auth_content %}
<div class="flex flex-col space-y-2 text-center">
    <div class="mx-auto bg-primary text-primary-foreground h-10 w-10 rounded-md flex items-center justify-center mb-2">
        <i class="fas fa-cube text-xl"></i>
    </div>
    <h1 class="text-2xl font-semibold tracking-tight">Create an account</h1>
    <p class="text-sm text-muted-foreground">
        Enter your details below to create your account
    </p>
</div>

<form class="space-y-4 pt-4" action="{% url 'register' %}" method="POST">
    {% csrf_token %}
    
    <div class="space-y-4">
        <div class="space-y-2">
            <label for="email-address" class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">Email</label>
            <input id="email-address" name="email" type="email" autocomplete="email" required 
                class="shadcn-input flex h-10 w-full rounded-md px-3 py-2 text-sm placeholder:text-muted-foreground" 
                placeholder="m@example.com">
        </div>
        <div class="space-y-2">
            <label for="password" class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">Password</label>
            <input id="password" name="password" type="password" autocomplete="new-password" required 
                class="shadcn-input flex h-10 w-full rounded-md px-3 py-2 text-sm placeholder:text-muted-foreground" 
                placeholder="••••••••">
        </div>
        <div class="space-y-2">
            <label for="password_confirm" class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">Confirm Password</label>
            <input id="password_confirm" name="password_confirm" type="password" autocomplete="new-password" required 
                class="shadcn-input flex h-10 w-full rounded-md px-3 py-2 text-sm placeholder:text-muted-foreground" 
                placeholder="••••••••">
        </div>
    </div>

    <button type="submit" class="shadcn-btn inline-flex items-center justify-center h-10 px-4 py-2 w-full transition-colors text-sm">
        Create account
    </button>
    
    <div class="text-center pt-2">
        <p class="text-sm text-muted-foreground">
            Already have an account? 
            <a href="{% url 'login' %}" class="underline underline-offset-4 hover:text-primary transition-colors">Sign in</a>
        </p>
    </div>
</form>
{% endblock %}
