<!-- Base Reusable Modal -->
<div
  x-cloak
  x-show="modalOpen"
  class="relative z-50"
  aria-labelledby="modal-title"
  role="dialog"
  aria-modal="true"
>
  <div
    x-show="modalOpen"
    x-transition.opacity
    class="fixed inset-0 bg-black/80 backdrop-blur-sm transition-opacity"
  ></div>
  <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
    <div
      class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0"
    >
      <div
        x-show="modalOpen"
        @click.away="modalOpen = false"
        x-transition:enter="ease-out duration-300"
        x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
        x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
        x-transition:leave="ease-in duration-200"
        x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
        x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
        class="relative transform overflow-hidden rounded-lg border border-border bg-background text-left shadow-lg transition-all sm:my-8 w-full sm:max-w-lg"
      >
        <!-- Dynamic Content Area -->
        <div id="modal-content">{% block modal_content %}{% endblock %}</div>
      </div>
    </div>
  </div>
</div>
